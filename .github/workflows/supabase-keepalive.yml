# Supabase Keepalive
#
# WHY THIS EXISTS (do not delete):
# Supabase free-tier projects are auto-paused after 7 days of inactivity.
# Three of my live projects (EduScale, DevTrack, KhataGo) each back onto a
# free-tier Supabase project. If they get paused, users hitting the live
# sites see auth/db errors until I manually unpause from the dashboard.
#
# This workflow pings each project's REST endpoint once per day. A single
# authenticated GET against `/rest/v1/` is enough to register "activity"
# and reset the 7-day inactivity clock — no data is fetched or mutated.
#
# If a ping fails (non-2xx), the job fails so GitHub notifies me by email
# and I can investigate before the project actually pauses.
#
# Secrets required in repo settings -> Secrets and variables -> Actions:
#   EDUSCALE_SUPABASE_URL, EDUSCALE_SUPABASE_ANON_KEY
#   DEVTRACK_SUPABASE_URL, DEVTRACK_SUPABASE_ANON_KEY
#   KHATAGO_SUPABASE_URL,  KHATAGO_SUPABASE_ANON_KEY

name: Supabase Keepalive

on:
  schedule:
    # Daily at 09:00 UTC. GitHub cron can be delayed during high load, but
    # daily cadence gives us ~6 days of buffer before the 7-day pause window.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping:
    name: Ping ${{ matrix.project.name }}
    runs-on: ubuntu-latest
    strategy:
      # Don't let one broken project prevent the others from being pinged.
      fail-fast: false
      matrix:
        project:
          - name: EduScale
            url_secret: EDUSCALE_SUPABASE_URL
            key_secret: EDUSCALE_SUPABASE_ANON_KEY
          - name: DevTrack
            url_secret: DEVTRACK_SUPABASE_URL
            key_secret: DEVTRACK_SUPABASE_ANON_KEY
          - name: KhataGo
            url_secret: KHATAGO_SUPABASE_URL
            key_secret: KHATAGO_SUPABASE_ANON_KEY
    steps:
      - name: Ping Supabase REST endpoint
        env:
          SUPABASE_URL: ${{ secrets[matrix.project.url_secret] }}
          SUPABASE_ANON_KEY: ${{ secrets[matrix.project.key_secret] }}
          PROJECT_NAME: ${{ matrix.project.name }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Missing secret for ${PROJECT_NAME} (URL or anon key is empty)."
            exit 1
          fi

          # Strip any trailing slash so we always hit exactly `/rest/v1/`.
          BASE_URL="${SUPABASE_URL%/}"
          ENDPOINT="${BASE_URL}/rest/v1/"

          echo "Pinging ${PROJECT_NAME} at ${ENDPOINT}"

          # --fail   -> non-2xx becomes a non-zero exit (job fails)
          # --silent -> suppress progress meter
          # --show-error -> still print the error body on failure
          # -o /dev/null -> discard response body, we only care about status
          # -w -> print the HTTP status for the job log
          HTTP_STATUS=$(curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --max-time 30 \
            -o /dev/null \
            -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${ENDPOINT}")

          echo "${PROJECT_NAME} responded with HTTP ${HTTP_STATUS}"

          {
            echo "### ${PROJECT_NAME}"
            echo ""
            echo "- Endpoint: \`${ENDPOINT}\`"
            echo "- Status: \`${HTTP_STATUS}\` (OK)"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

  summary:
    name: Keepalive summary
    needs: ping
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write overall summary
        run: |
          RESULT="${{ needs.ping.result }}"
          {
            echo "## Supabase Keepalive"
            echo ""
            echo "- Overall ping job result: \`${RESULT}\`"
            echo "- Projects: EduScale, DevTrack, KhataGo"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo ""
            if [ "${RESULT}" = "success" ]; then
              echo "All Supabase projects were pinged successfully."
            else
              echo "At least one project failed to respond with 2xx. Check the \`ping\` matrix jobs above for details and verify the project is not already paused."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
